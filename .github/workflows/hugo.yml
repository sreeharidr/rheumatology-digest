name: Deploy Hugo site to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.161.1
    steps:
      - name: Install Hugo CLI
        run: |
          wget -O ${{ runner.temp }}/hugo.deb \
            https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb \
          && sudo dpkg -i ${{ runner.temp }}/hugo.deb

      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Build with Hugo
        env:
          HUGO_ENVIRONMENT: production
          HUGO_ENV: production
        run: |
          hugo --gc --minify

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Post new content to Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.sha }}
        run: |
          set -eu

          # On the first push to a branch, BEFORE_SHA is all zeros — fall back to the parent commit.
          if [ "$BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            BEFORE_SHA="${AFTER_SHA}^"
          fi

          ADDED=$(git diff --name-status --diff-filter=A "$BEFORE_SHA".."$AFTER_SHA" \
            | awk '$1=="A" && ($2 ~ /^content\/(posts|cases)\/[^/]+\/index\.md$/) {print $2}')

          if [ -z "$ADDED" ]; then
            echo "No new posts or cases in this push."
            exit 0
          fi

          echo "$ADDED" | while IFS= read -r FILE; do
            DIR=$(dirname "$FILE")

            if grep -qE '^draft:[[:space:]]*true' "$FILE"; then
              echo "Skipping draft: $FILE"
              continue
            fi

            TITLE=$(grep -m1 '^title:' "$FILE" | sed -E 's/^title:[[:space:]]*"?([^"]*)"?[[:space:]]*$/\1/')
            SLUG=$(grep -m1 '^slug:' "$FILE"  | sed -E 's/^slug:[[:space:]]*"?([^"]*)"?[[:space:]]*$/\1/')

            case "$FILE" in
              content/posts/*) SECTION=posts ;;
              content/cases/*) SECTION=cases ;;
            esac

            URL="https://rheumatologydigest.org/${SECTION}/${SLUG}/"
            CAPTION="${TITLE}

${URL}"

            IMAGE=$(find "$DIR" -maxdepth 1 -iname 'infographic.*' | head -n1)

            if [ -n "$IMAGE" ]; then
              echo "Posting photo for $FILE"
              curl -sS --fail-with-body -X POST \
                "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto" \
                -F "chat_id=${TELEGRAM_CHAT_ID}" \
                -F "photo=@${IMAGE}" \
                -F "caption=${CAPTION}"
            else
              echo "Posting text for $FILE"
              curl -sS --fail-with-body -X POST \
                "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
                -d "chat_id=${TELEGRAM_CHAT_ID}" \
                --data-urlencode "text=${CAPTION}"
            fi
            echo
          done
